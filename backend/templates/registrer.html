<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Saúde na Mão</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>

<a href="{{ url_for('home') }}" class="home-icon" aria-label="Voltar para a página inicial">
    <i class="fas fa-home"></i>
</a>

<div class="container">
    <h2>Cadastro</h2>

    <input type="text" id="nome" placeholder="Nome">
    <input type="email" id="email-cadastro" placeholder="Email">
    <input type="password" id="senha-cadastro" placeholder="Senha">

    <button type="button" onclick="register()">Cadastrar</button>
</div>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
